<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Lista de Missões</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 50px;
    }

    input, button {
      padding: 10px;
      font-size: 16px;
      margin: 5px;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      margin: 10px;
      padding: 10px;
      background: #eee;
      cursor: pointer;
      border-radius: 5px;
    }

    .concluida {
      text-decoration: line-through;
      background: #c8f7c5;
      color: gray;
    }
  </style>
</head>
<body>

  <h1>Missões do Jogo 🎮</h1>

  <!-- FORMULÁRIO -->
  <input type="text" id="missao" placeholder="Digite uma missão">
  <button onclick="adicionarMissao()">Adicionar</button>

  <ul id="lista"></ul>

  <script>
    function adicionarMissao() {

      // VARIÁVEL
      let texto = document.getElementById("missao").value;
      let lista = document.getElementById("lista");

      // VALIDAÇÃO
      if (texto.trim() === "") {
        alert("Digite uma missão!");
        return;
      }

      // CRIAR ELEMENTO
      let item = document.createElement("li");
      item.textContent = texto;

      // EVENTO (clicar para concluir)
      item.addEventListener("click", function() {
        item.classList.toggle("concluida"); // ALTERANDO ESTILO
      });

      // ADICIONAR NA LISTA
      lista.appendChild(item);

      // LIMPAR INPUT
      document.getElementById("missao").value = "";
    }
  </script>

</body>
</html>
