<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Gerador de Tabuada</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 50px;
    }

    input, button {
      padding: 10px;
      font-size: 16px;
      margin: 5px;
    }

    #resultado {
      margin-top: 20px;
      font-size: 18px;
    }
  </style>
</head>
<body>

  <h1>Gerador de Tabuada</h1>

  <!-- FORMULÁRIO -->
  <input type="number" id="numero" placeholder="Digite um número">
  <br>
  <button onclick="gerarTabuada()">Gerar Tabuada</button>

  <div id="resultado"></div>

  <script>
    function gerarTabuada() {

      // VARIÁVEL
      let num = Number(document.getElementById("numero").value);
      let resultado = document.getElementById("resultado");

      // VALIDAÇÃO
      if (isNaN(num)) {
        resultado.innerHTML = "Digite um número válido!";
        return;
      }

      // LIMPAR CONTEÚDO ANTES
      resultado.innerHTML = "";

      // ESTRUTURA DE REPETIÇÃO
      for (let i = 1; i <= 10; i++) {

        // CRIANDO ELEMENTO HTML DINAMICAMENTE
        let linha = document.createElement("p");

        linha.textContent = num + " x " + i + " = " + (num * i);

        // ADICIONANDO NO HTML
        resultado.appendChild(linha);
      }
    }
  </script>

</body>
</html>
